<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Document</title>
</head>
<body>
    <!--Заголовок = h-->
    <h1>Заголовок 1 уровня</h1>
    <h2>Заголовок 2 уровня</h2>
    <h3>Заголово 3 уровня</h3>
    <h4>Заголовок 4 уровня</h4>

    <!--Абзац = p-->
    <p>
        Hi world!
    </p>

    <!--Делает линию на всю страницу-->
    <hr>

    <!-- Маркированный спиксок -->
     <ol>
        <li>Пункт 1</li>
        <li>Пункт 2</li>
        <li>Пункт 3</li>
     </ol>

     <ul>
        <li><i>Пункт 1</i></li>
        <li><u>Пункт 2</u></li>
        <li><mark>Пункт 3</mark></li>
     </ul>

     <div class="conteiner">
        <div class="menu"></div>
        <div class="main"><p>QWERTYUIOPdfghjklertyuiopdfghjk!@</p>
     </div>

</body>
</html>
